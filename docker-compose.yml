services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: janus
      POSTGRES_PASSWORD: janus
      POSTGRES_DB: janus
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janus"]
      interval: 5s
      timeout: 5s
      retries: 5

  janus:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://janus:janus@db:5432/janus
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      JANUS_BOTS_ENABLED: "false"
      JANUS_OVERSIGHT_ENABLED: "false"
    ports:
      - "3001:3001"

volumes:
  pgdata:

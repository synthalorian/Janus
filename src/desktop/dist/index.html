<!DOCTYPE html>
<html lang="en" data-theme="synthwave84">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Janus Desktop</title>
  <style>
/* ════════════════════════════════════════════════════
   JANUS THEME ENGINE — 7 Themes (Standalone for Tauri)
   ════════════════════════════════════════════════════ */

/* ── System font stack (no CDN needed) ──────────── */
:root {
  --font-display: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'Courier New', 'DejaVu Sans Mono', 'Ubuntu Mono', monospace;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}

/* ══════════ SYNTHWAVE '84 ══════════ */
:root, [data-theme="synthwave84"] {
  --bg-primary: #0d0221;
  --bg-secondary: #16082e;
  --bg-tertiary: #240037;
  --bg-hover: #2e0052;
  --bg-surface: #1a0a30;
  --bg-raised: #2a1040;
  --bg-overlay: rgba(13, 2, 33, 0.92);
  --text-primary: #ffffff;
  --text-secondary: #c8b8e8;
  --text-muted: #7a6b9e;
  --text-inverse: #0d0221;
  --accent-primary: #8f00ff;
  --accent-secondary: #ff00ff;
  --accent-tertiary: #ffff66;
  --accent-cyan: #03edf9;
  --accent-red: #ff0040;
  --accent-green: #00ff41;
  --accent-orange: #ff6600;
  --accent-pink: #ff007f;
  --accent-blue: #0080ff;
  --success: #00ff41;
  --warning: #f3e70f;
  --error: #ff0040;
  --info: #03edf9;
  --border-color: #3d1f6e;
  --border-glow: rgba(143, 0, 255, 0.3);
  --border-light: #5a2a9e;
  --glow-primary: 0 0 12px rgba(143, 0, 255, 0.4), 0 0 24px rgba(143, 0, 255, 0.15);
  --gradient-primary: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  --gradient-sidebar: linear-gradient(180deg, #16082e 0%, #0d0221 100%);
  --crt-opacity: 0.25;
  --grid-opacity-2: rgba(143, 0, 255, 0.08);
  --radius: 8px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --transition-normal: 250ms ease;
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
}

/* ══════════ DARK ══════════ */
[data-theme="dark"] {
  --bg-primary: #1a1b26;
  --bg-secondary: #24253a;
  --bg-tertiary: #2e2f45;
  --bg-surface: #1e1f33;
  --text-primary: #cdd6f4;
  --text-secondary: #a6adc8;
  --text-muted: #6c7086;
  --accent-primary: #89b4fa;
  --accent-secondary: #cba6f7;
  --border-color: #45475a;
  --border-light: #585b70;
  --gradient-primary: linear-gradient(135deg, #89b4fa, #cba6f7);
  --crt-opacity: 0;
  --grid-opacity-2: transparent;
}

/* ══════════ LIGHT ══════════ */
[data-theme="light"] {
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fa;
  --bg-tertiary: #f0f0f5;
  --bg-surface: #ffffff;
  --text-primary: #1a1a2e;
  --text-secondary: #555570;
  --text-muted: #9ca3af;
  --accent-primary: #2563eb;
  --accent-secondary: #7c3aed;
  --border-color: #d0d0e0;
  --border-light: #e0e0f0;
  --gradient-primary: linear-gradient(135deg, #2563eb, #7c3aed);
  --crt-opacity: 0;
  --grid-opacity-2: transparent;
}

/* ══════════ CYBERPUNK ══════════ */
[data-theme="cyberpunk"] {
  --bg-primary: #0a0a0a;
  --bg-secondary: #1a1a2e;
  --bg-tertiary: #16213e;
  --bg-surface: #0f3460;
  --text-primary: #e0e0ff;
  --text-secondary: #a0a0ff;
  --text-muted: #6060aa;
  --accent-primary: #ff006e;
  --accent-secondary: #00d4ff;
  --accent-tertiary: #ffea00;
  --border-color: #ff006e;
  --border-light: #00d4ff;
  --gradient-primary: linear-gradient(135deg, #ff006e, #00d4ff);
  --crt-opacity: 0;
  --grid-opacity-2: rgba(0, 212, 255, 0.05);
}

/* ══════════ MIDNIGHT ══════════ */
[data-theme="synthwave-midnight"] {
  --bg-primary: #0a0e27;
  --bg-secondary: #12163b;
  --bg-tertiary: #1a2050;
  --bg-surface: #0e1235;
  --text-primary: #d0d8ff;
  --text-secondary: #8899dd;
  --text-muted: #5566aa;
  --accent-primary: #4488ff;
  --accent-secondary: #00ccff;
  --border-color: #2a3a6e;
  --border-light: #3a5a8e;
  --gradient-primary: linear-gradient(135deg, #4488ff, #00ccff);
  --crt-opacity: 0.15;
  --grid-opacity-2: rgba(0, 204, 255, 0.05);
}

/* ══════════ DAWN ══════════ */
[data-theme="synthwave-dawn"] {
  --bg-primary: #1a0a05;
  --bg-secondary: #2a1510;
  --bg-tertiary: #3a2015;
  --bg-surface: #22100a;
  --text-primary: #ffe8d0;
  --text-secondary: #ddbb99;
  --text-muted: #998866;
  --accent-primary: #ff8844;
  --accent-secondary: #ffcc00;
  --border-color: #5a3a20;
  --border-light: #8a5a30;
  --gradient-primary: linear-gradient(135deg, #ff8844, #ffcc00);
  --crt-opacity: 0.12;
  --grid-opacity-2: rgba(255, 136, 68, 0.05);
}

/* ══════════ FALLOUT ══════════ */
[data-theme="fallout-terminal"] {
  --bg-primary: #0a0a0a;
  --bg-secondary: #0f0f0f;
  --bg-tertiary: #141414;
  --bg-surface: #0c0c0c;
  --text-primary: #00ff41;
  --text-secondary: #00cc33;
  --text-muted: #009922;
  --accent-primary: #00ff41;
  --accent-secondary: #33ff77;
  --border-color: #00ff41;
  --border-light: #00cc33;
  --font-body: 'Courier New', 'DejaVu Sans Mono', monospace;
  --font-mono: 'Courier New', 'DejaVu Sans Mono', monospace;
  --font-display: 'Courier New', 'DejaVu Sans Mono', monospace;
  --crt-opacity: 0.3;
  --grid-opacity-2: rgba(0, 255, 65, 0.03);
  --gradient-primary: linear-gradient(135deg, #00ff41, #33ff77);
}

/* ════════════════════════════════════════════════════
   BASE STYLES
   ════════════════════════════════════════════════════ */

*, *::before, *::after {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

a { color: var(--accent-primary); text-decoration: none; }
a:hover { text-decoration: underline; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

::selection {
  background: color-mix(in srgb, var(--accent-primary) 30%, transparent);
  color: var(--text-primary);
}

:focus-visible {
  outline: 2px solid var(--accent-primary);
  outline-offset: 2px;
}

::placeholder { color: var(--text-muted); opacity: 0.7; }

/* CRT Scanline overlay */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
  opacity: var(--crt-opacity);
}

/* Grid overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: linear-gradient(var(--grid-opacity-2) 1px, transparent 1px), linear-gradient(90deg, var(--grid-opacity-2) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 9998;
}

/* ════════════════════════════════════════════════════
   LAYOUT
   ════════════════════════════════════════════════════ */

.janus-layout {
  display: flex;
  height: 100vh;
  width: 100vw;
}

.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--gradient-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px;
  border-bottom: 1px solid var(--border-color);
}

.sidebar-logo {
  width: 32px;
  height: 32px;
  border-radius: 6px;
}

.sidebar-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.12em;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.sidebar-section-label {
  font-size: 9px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 12px 16px 4px;
}

.sidebar-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-normal);
  border-left: 3px solid transparent;
}

.sidebar-link:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  text-decoration: none;
}

.sidebar-link.active {
  background: color-mix(in srgb, var(--accent-primary) 10%, transparent);
  border-left-color: var(--accent-primary);
  color: var(--text-primary);
}

.sidebar-link-icon { font-size: 16px; width: 20px; text-align: center; }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border-color);
}

.sidebar-user {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--gradient-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-inverse);
  flex-shrink: 0;
}

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.main-header h1 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  margin: 0;
  letter-spacing: 0.06em;
}

.main-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
}

/* ════════════════════════════════════════════════════
   AUTH SCREEN
   ════════════════════════════════════════════════════ */

.auth-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg-primary);
  position: relative;
  overflow: hidden;
}

.auth-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-xl);
  padding: 48px 40px;
  width: 400px;
  max-width: 90vw;
  position: relative;
  z-index: 1;
  box-shadow: var(--shadow-lg);
}

.auth-card-logo {
  width: 80px;
  height: 80px;
  display: block;
  margin: 0 auto 16px;
  border-radius: 20px;
}

.auth-card h1 {
  text-align: center;
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  margin: 0 0 4px;
  letter-spacing: 0.08em;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.auth-card > p {
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  margin: 0 0 24px;
}

.auth-error {
  background: color-mix(in srgb, var(--error) 15%, transparent);
  border: 1px solid color-mix(in srgb, var(--error) 30%, transparent);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 12px;
  color: var(--error);
  margin-bottom: 16px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ════════════════════════════════════════════════════
   COMPONENTS
   ════════════════════════════════════════════════════ */

.janus-input, .janus-select, .janus-textarea {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color var(--transition-normal);
  -webkit-appearance: none;
  appearance: none;
}

.janus-select option {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.janus-input::placeholder, .janus-textarea::placeholder {
  color: var(--text-muted);
  opacity: 0.7;
}

.janus-input:focus, .janus-select:focus, .janus-textarea:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 2px var(--border-glow);
}

.janus-select {
  cursor: pointer;
  appearance: auto;
}

.janus-textarea {
  resize: vertical;
  min-height: 60px;
  line-height: 1.6;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-normal);
  letter-spacing: 0.03em;
}

.btn-primary {
  background: var(--gradient-primary);
  color: var(--text-inverse);
}

.btn-primary:hover {
  opacity: 0.9;
  box-shadow: var(--glow-primary);
}

.btn-secondary {
  background: var(--bg-raised);
  color: var(--text-primary);
  border: 1px solid var(--border-light);
}

.btn-secondary:hover {
  background: var(--bg-hover);
  border-color: var(--accent-primary);
}

.btn-lg {
  width: 100%;
  justify-content: center;
  padding: 12px 20px;
  font-size: 14px;
}

/* Cards */
.janus-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-md);
}

.janus-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.janus-card-title {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 16px;
  text-align: center;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-label {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 4px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 20px 0 8px;
}

/* Badges */
.badge {
  display: inline-block;
  padding: 2px 8px;
  font-size: 9px;
  font-family: var(--font-mono);
  border-radius: 999px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.badge-success { background: color-mix(in srgb, var(--success) 15%, transparent); color: var(--success); }
.badge-warning { background: color-mix(in srgb, var(--warning) 15%, transparent); color: var(--warning); }
.badge-error { background: color-mix(in srgb, var(--error) 15%, transparent); color: var(--error); }
.badge-primary { background: color-mix(in srgb, var(--accent-primary) 15%, transparent); color: var(--accent-primary); }

/* Flash messages */
.flash {
  padding: 12px 16px;
  border-radius: var(--radius-md);
  font-size: 13px;
}

.flash-alert {
  background: color-mix(in srgb, var(--error) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--error) 30%, transparent);
  color: var(--error);
}

/* Chat */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
}

.chat-message {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: var(--radius-lg);
  font-size: 13px;
  line-height: 1.6;
  word-wrap: break-word;
  white-space: pre-wrap;
}

.chat-message.user {
  align-self: flex-end;
  background: var(--accent-tertiary);
  color: #0d0221;
}

.chat-message.ai {
  align-self: flex-start;
  background: var(--bg-surface);
  border: 1px solid var(--border-light);
  color: var(--text-primary);
}

.chat-timestamp {
  font-size: 9px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 4px;
}

.chat-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 8px;
}

.chat-empty-icon {
  font-size: 48px;
  opacity: 0.5;
}

.chat-input-bar {
  border-top: 1px solid var(--border-color);
  padding: 12px;
}

.chat-input-wrapper {
  display: flex;
  gap: 8px;
}

.chat-input {
  flex: 1;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  resize: none;
  outline: none;
  min-height: 40px;
  max-height: 120px;
  line-height: 1.5;
  -webkit-appearance: none;
  appearance: none;
}

.chat-input::placeholder {
  color: var(--text-muted);
  opacity: 0.7;
}

.chat-input:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 2px var(--border-glow);
}

.chat-send-btn {
  background: var(--gradient-primary);
  color: var(--text-inverse);
  border: none;
  border-radius: var(--radius-lg);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  height: 40px;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}

.chat-send-btn:hover {
  opacity: 0.9;
  box-shadow: var(--glow-primary);
}

.chat-input-hint {
  font-size: 9px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 4px;
}

.channel-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--radius-md);
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background var(--transition-normal);
}

.channel-item:hover {
  background: var(--bg-hover);
  text-decoration: none;
}

.channel-item.active {
  background: color-mix(in srgb, var(--accent-primary) 10%, transparent);
  color: var(--text-primary);
}

.channel-indicator {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.channel-indicator.chat { background: var(--accent-cyan); }
.channel-indicator.forum { background: var(--accent-secondary); }
.channel-indicator.board { background: var(--accent-tertiary); }

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.janus-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.janus-table th {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
}

.janus-table td {
  padding: 10px 14px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
}

.connection-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
.dot.disconnected { background: var(--error); box-shadow: 0 0 6px var(--error); }

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border-light);
  border-top: 3px solid var(--accent-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#theme-dialog {
  background: var(--bg-surface);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-xl);
  color: var(--text-primary);
  max-width: 500px;
  width: 90vw;
  padding: 0;
  box-shadow: var(--shadow-lg);
}

#theme-dialog::backdrop {
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
}

.theme-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  padding: 20px;
}

.theme-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 11px;
  transition: all var(--transition-normal);
}

.theme-btn:hover {
  background: var(--bg-raised);
  border-color: var(--accent-primary);
  color: var(--text-primary);
}

.theme-btn.active {
  border-color: var(--accent-primary);
  background: color-mix(in srgb, var(--accent-primary) 15%, transparent);
  color: var(--text-primary);
}

.theme-btn-icon { font-size: 24px; }

.chat-container {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* Markdown in chat */
.chat-message pre {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 10px;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 12px;
  margin: 6px 0;
}

.chat-message code {
  background: var(--bg-primary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
}

.chat-message pre code {
  background: none;
  padding: 0;
}

.chat-message strong { font-weight: 700; }
.chat-message em { font-style: italic; }

/* Toast notifications */
.toast-container {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 16px;
  border-radius: var(--radius-md);
  font-size: 13px;
  max-width: 320px;
  animation: toastIn 0.3s ease;
}

.toast.success {
  background: color-mix(in srgb, var(--success) 15%, transparent);
  border: 1px solid color-mix(in srgb, var(--success) 40%, transparent);
  color: var(--success);
}

.toast.error {
  background: color-mix(in srgb, var(--error) 15%, transparent);
  border: 1px solid color-mix(in srgb, var(--error) 40%, transparent);
  color: var(--error);
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
  </style>
</head>
<body>

            <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);" id="user-type">human</div>

    <main class="main-content">

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="auth-container" style="display:none;">
    <div class="auth-card">
      <img src="icons/128x128.png" alt="Janus" class="auth-card-logo">
      <h1>Janus</h1>
      <p>The gateway between mankind and AI</p>

      <form id="auth-form">
        <div class="form-group">

  <!-- THEME DIALOG -->
  <dialog id="theme-dialog">
    <div style="padding:20px 20px 12px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;">
      <h3 style="font-family:var(--font-display);font-size:14px;font-weight:600;margin:0;letter-spacing:0.04em;">Choose Theme</h3>
      <button id="theme-dialog-close" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;">&#x2715;</button>
    </div>
    <div class="theme-grid" id="theme-grid"></div>
  </dialog>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO" crossorigin="anonymous"></script>
  <script>
// ════════════════════════════════════════════════════
// JANUS DESKTOP — Tauri-Aware Frontend
// Uses tauri.invoke when running in Tauri, fetch as fallback
// Socket.IO for real-time messaging, presence, orchestration
// ════════════════════════════════════════════════════

(function() {
  'use strict';

  const API_BASE = 'http://localhost:3001';

  // Detect Tauri runtime
  const isTauri = typeof window !== 'undefined' && window.__TAURI__ !== undefined;
  const invoke = isTauri ? window.__TAURI__.core.invoke : null;

  let state = {
    authenticated: false,
    userName: 'Desktop Explorer',
    userId: null,
    authToken: null,
    currentView: 'dashboard',
    currentChannelId: null,
    apiConnected: false,
  };

  // ── Socket.IO Manager ──
  const SocketManager = {
    socket: null,
    connected: false,
    reconnectAttempts: 0,
    maxReconnectAttempts: 10,
    reconnectDelay: 2000,
    presence: {},
    orchestration: {},

    init() {
      if (typeof io === 'undefined') {
        console.warn('Socket.IO client not available');
        return;
      }
      this.socket = io(API_BASE, {
        transports: ['websocket', 'polling'],
        reconnection: true,
        reconnectionAttempts: this.maxReconnectAttempts,
        reconnectionDelay: this.reconnectDelay,
        reconnectionDelayMax: 10000,
        timeout: 20000,
      });
      this._bindEvents();
    },

    _bindEvents() {
      const s = this.socket;
      if (!s) return;

      s.on('connect', () => {
        console.log('Socket connected:', s.id);
        this.connected = true;
        this.reconnectAttempts = 0;
        this._updateConnectionStatus();
        if (state.authenticated && state.userId) {
          this.authenticate();
        }
        // Rejoin current channel if any
        if (state.currentChannelId) {
          this.joinChannel(state.currentChannelId);
        }
      });

      s.on('disconnect', (reason) => {
        console.log('Socket disconnected:', reason);
        this.connected = false;
        this._updateConnectionStatus();
      });

      s.on('connect_error', (err) => {
        console.error('Socket connect error:', err.message);
        this.connected = false;
        this.reconnectAttempts++;
        this._updateConnectionStatus();
      });

      s.on('reconnect', (attempt) => {
        console.log('Socket reconnected after', attempt, 'attempts');
        showToast('Real-time connection restored', 'success');
      });

      s.on('reconnect_failed', () => {
        console.error('Socket reconnect failed');
        showToast('Real-time connection lost', 'error');
      });

      // ── Channel / Message events ──
      s.on('channels:list', (channels) => {
        console.log('Channels list received:', channels.length);
      });

      s.on('messages:history', ({ channelId, messages }) => {
        console.log('Message history for', channelId, ':', messages.length);
        if (state.currentChannelId === channelId && state.currentView === 'chat') {
          this._refreshChatMessages(messages);
        }
      });

      s.on('message:new', (message) => {
        console.log('New message:', message);
        if (state.currentChannelId === message.channelId && state.currentView === 'chat') {
          this._appendChatMessage(message);
          this._scrollToBottom();
        } else if (state.currentChannelId === message.channelId) {
          // In background: show toast for new messages
          const sender = message.authorName || message.authorId || 'Unknown';
          showToast('New message from ' + sender, 'success');
        }
      });

      // ── Message streaming (AI responses) ──
      s.on('message:stream:start', (data) => {
        console.log('Stream start:', data.messageId);
        if (state.currentChannelId && state.currentView === 'chat') {
          this._appendStreamMessage(data.messageId, data.authorName, data.authorType);
        }
      });

      s.on('message:stream:chunk', (data) => {
        if (state.currentChannelId && state.currentView === 'chat') {
          this._appendStreamChunk(data.messageId, data.chunk);
        }
      });

      s.on('message:stream:end', (message) => {
        console.log('Stream end:', message.id);
        if (state.currentChannelId && state.currentView === 'chat') {
          this._finalizeStreamMessage(message);
        }
      });

      // ── Typing indicators ──
      s.on('user:typing', (data) => {
        if (state.currentChannelId === data.channelId && state.currentView === 'chat') {
          this._showTypingIndicator(data.userName);
        }
      });

      s.on('user:stopped-typing', (data) => {
        if (state.currentChannelId === data.channelId && state.currentView === 'chat') {
          this._hideTypingIndicator(data.userId);
        }
      });

      // ── Presence updates ──
      s.on('presence:update', (data) => {
        console.log('Presence update:', data);
        if (data.userId) {
          this.presence[data.userId] = data;
        }
        this._updatePresenceUI(data);
      });

      // ── Orchestration events ──
      s.on('orchestrate:snapshot', (snapshot) => {
        console.log('Orchestration snapshot:', snapshot);
        if (snapshot && snapshot.planId) {
          this.orchestration[snapshot.planId] = snapshot;
        }
        if (state.currentView === 'swarm') {
          this._updateSwarmUI(snapshot);
        }
      });

      s.on('orchestrate:progress', (data) => {
        console.log('Orchestration progress:', data);
        if (data && data.planId) {
          this.orchestration[data.planId] = data;
        }
        if (state.currentView === 'swarm') {
          this._updateSwarmProgress(data);
        } else {
          showToast('Swarm: ' + (data.event || 'update') + ' — ' + (data.planId || '').substring(0, 8), 'success');
        }
      });
    },

    authenticate() {
      if (!this.socket || !this.connected) return;
      this.socket.emit('auth', {
        token: state.authToken,
        userId: state.userId,
        userName: state.userName,
        userType: document.getElementById('user-type') ? document.getElementById('user-type').textContent : 'human'
      });
      console.log('Socket auth sent for user:', state.userId);
    },

    joinChannel(channelId) {
      if (!this.socket || !this.connected || !channelId) return;
      this.socket.emit('channel:join', channelId);
      console.log('Joined channel:', channelId);
    },

    leaveChannel(channelId) {
      if (!this.socket || !this.connected || !channelId) return;
      this.socket.emit('channel:leave', channelId);
      console.log('Left channel:', channelId);
    },

    sendMessage(data) {
      if (!this.socket || !this.connected) {
        console.warn('Socket not connected, falling back to REST');
        return false;
      }
      this.socket.emit('message:send', {
        channelId: data.channelId,
        content: data.content,
        authorId: data.authorId,
        authorName: data.authorName,
        authorType: data.authorType || 'human'
      });
      return true;
    },

    subscribeOrchestration(planId) {
      if (!this.socket || !this.connected || !planId) return;
      this.socket.emit('orchestrate:subscribe', planId);
      console.log('Subscribed to plan:', planId);
    },

    unsubscribeOrchestration(planId) {
      if (!this.socket || !this.connected || !planId) return;
      this.socket.emit('orchestrate:unsubscribe', planId);
    },

    startTyping(channelId) {
      if (!this.socket || !this.connected || !channelId) return;
      this.socket.emit('typing:start', {
        channelId: channelId,
        userId: state.userId,
        userName: state.userName
      });
    },

    stopTyping(channelId) {
      if (!this.socket || !this.connected || !channelId) return;
      this.socket.emit('typing:stop', {
        channelId: channelId,
        userId: state.userId
      });
    },

    _updateConnectionStatus() {
      const dot = document.getElementById('conn-dot');
      const text = document.getElementById('conn-text');
      if (dot) dot.className = 'dot ' + (this.connected ? 'connected' : 'disconnected');
      if (text) text.textContent = this.connected ? 'Live' : 'Disconnected';
    },

    _appendChatMessage(msg) {
      const container = document.getElementById('messages-container');
      if (!container) return;
      const div = document.createElement('div');
      div.className = 'chat-message ' + (msg.authorType === 'human' ? 'user' : 'ai');
      div.innerHTML = '<div style="font-size:9px;font-weight:600;text-transform:uppercase;opacity:0.7;margin-bottom:2px;">' + escapeHtml(msg.authorName || msg.authorId) + '</div>'
        + '<div>' + formatMessageContent(msg.content) + '</div>'
        + '<div class="chat-timestamp">' + formatTime(msg.createdAt) + '</div>';
      container.appendChild(div);
    },

    _refreshChatMessages(messages) {
      const container = document.getElementById('messages-container');
      if (!container) return;
      if (!messages || !messages.length) {
        container.innerHTML = '<div class="chat-empty"><div style="font-size:13px;">No messages yet</div></div>';
        return;
      }
      container.innerHTML = messages.map(function(msg) {
        return '<div class="chat-message ' + (msg.authorType === 'human' ? 'user' : 'ai') + '">'
          + '<div style="font-size:9px;font-weight:600;text-transform:uppercase;opacity:0.7;margin-bottom:2px;">' + escapeHtml(msg.authorName || msg.authorId) + '</div>'
          + '<div>' + formatMessageContent(msg.content) + '</div>'
          + '<div class="chat-timestamp">' + formatTime(msg.createdAt) + '</div></div>';
      }).join('');
      this._scrollToBottom();
    },

    _appendStreamMessage(messageId, authorName, authorType) {
      const container = document.getElementById('messages-container');
      if (!container) return;
      const div = document.createElement('div');
      div.id = 'stream-' + messageId;
      div.className = 'chat-message ' + (authorType === 'human' ? 'user' : 'ai');
      div.innerHTML = '<div style="font-size:9px;font-weight:600;text-transform:uppercase;opacity:0.7;margin-bottom:2px;">' + escapeHtml(authorName || 'AI') + '</div>'
        + '<div class="stream-content"></div>'
        + '<div class="chat-timestamp">' + formatTime(new Date().toISOString()) + '</div>';
      container.appendChild(div);
      this._scrollToBottom();
    },

    _appendStreamChunk(messageId, chunk) {
      const msgDiv = document.getElementById('stream-' + messageId);
      if (!msgDiv) return;
      const contentDiv = msgDiv.querySelector('.stream-content');
      if (contentDiv) {
        contentDiv.textContent += chunk;
      }
      this._scrollToBottom();
    },

    _finalizeStreamMessage(message) {
      const msgDiv = document.getElementById('stream-' + message.id);
      if (msgDiv) {
        msgDiv.id = 'msg-' + message.id;
        msgDiv.querySelector('.stream-content').innerHTML = formatMessageContent(message.content);
      } else {
        // If stream div was not found, append as regular message
        this._appendChatMessage(message);
      }
      this._scrollToBottom();
    },

    _scrollToBottom() {
      const container = document.getElementById('messages-container');
      if (container) container.scrollTop = container.scrollHeight;
    },

    _showTypingIndicator(userName) {
      let indicator = document.getElementById('typing-indicator');
      if (!indicator) {
        const container = document.getElementById('messages-container');
        if (!container) return;
        indicator = document.createElement('div');
        indicator.id = 'typing-indicator';
        indicator.className = 'chat-message ai';
        indicator.style.opacity = '0.7';
        indicator.innerHTML = '<div style="font-size:9px;font-weight:600;text-transform:uppercase;opacity:0.7;margin-bottom:2px;">' + escapeHtml(userName || 'Someone') + '</div>'
          + '<div style="font-style:italic;color:var(--text-muted);">typing...</div>';
        container.appendChild(indicator);
        this._scrollToBottom();
      }
    },

    _hideTypingIndicator(userId) {
      const indicator = document.getElementById('typing-indicator');
      if (indicator) indicator.remove();
    },

    _updatePresenceUI(data) {
      // Update user presence in sidebar or other UI elements
      const avatar = document.getElementById('user-avatar');
      if (avatar && data.userId === state.userId) {
        avatar.style.boxShadow = data.status === 'online'
          ? '0 0 0 2px var(--success)'
          : '0 0 0 2px var(--error)';
      }
    },

    _updateSwarmUI(snapshot) {
      // Trigger a refresh of the swarm view if new data arrives
      if (state.currentView === 'swarm') {
        loadView('swarm');
      }
    },

    _updateSwarmProgress(data) {
      // Could update specific plan cards in-place; for now refresh view
      if (state.currentView === 'swarm') {
        // Debounce refresh to avoid excessive re-renders
        clearTimeout(this._swarmRefreshTimer);
        this._swarmRefreshTimer = setTimeout(function() {
          loadView('swarm');
        }, 500);
      }
    }
  };

  // Expose for debugging
  window.JanusSocket = SocketManager;

  // ── API Bridge: Tauri invoke → fallback to fetch ──
  async function apiCall(method, path, body) {
    if (isTauri && invoke) {
      // Map REST calls to Tauri commands
      const cmdMap = {
        'GET:/api/health': 'get_health',
        'GET:/api/stats': 'get_stats',
        'POST:/api/auth/register': 'register',
        'GET:/api/channels': 'get_channels',
        'GET:/api/channels/*/messages': 'get_channel_messages',
        'POST:/api/messages': 'send_message',
        'GET:/api/bots': 'get_bots',
        'POST:/api/bots/spawn': 'spawn_bot',
        'GET:/api/souls': 'get_souls',
        'GET:/api/oversight/stats': 'get_oversight_stats',
        'GET:/api/orchestrate': 'get_plans',
        'GET:/api/graph/nodes': 'get_graph_stats',
        'GET:/api/auth/keys': 'get_api_keys',
      };

      let cmd = cmdMap[method + ':' + path];
      if (!cmd && path.includes('/messages?')) {
        cmd = 'get_channel_messages';
      }

      if (cmd) {
        try {
          let args = {};
          if (cmd === 'register') args = { name: body.name, agent_type: body.type };
          else if (cmd === 'get_channel_messages') {
            const match = path.match(/\/channels\/([^\/]+)/);
            args = { channel_id: match ? match[1] : '' };
          }
          else if (cmd === 'send_message') {
            args = {
              channel_id: body.channelId,
              content: body.content,
              author_id: body.authorId,
              author_name: body.authorName,
              author_type: body.authorType
            };
          }
          else if (cmd === 'spawn_bot') args = { template: body.template, name: body.name };

          const result = await invoke(cmd, args);
          // Tauri returns JSON string from Rust — parse it
          if (typeof result === 'string') {
            try { return JSON.parse(result); } catch(_) { return { success: true, data: result }; }
          }
          return result;
        } catch (e) {
          return { success: false, error: e.message || 'Tauri invoke failed' };
        }
      }
    }

    // Fallback to fetch
    try {
      const headers = { 'Content-Type': 'application/json' };
      if (state.authToken) headers['Authorization'] = 'Bearer ' + state.authToken;
      const opts = { method, headers };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(API_BASE + path, opts);
      if (!res.ok) {
        const errBody = await res.text().catch(function() { return ''; });
        try { return JSON.parse(errBody); } catch(_) {}
        return { success: false, error: 'Server error: ' + res.status };
      }
      return await res.json();
    } catch (e) {
      return { success: false, error: 'Cannot connect to ' + API_BASE };
    }
  }

  function setConnectionStatus(connected) {
    state.apiConnected = connected;
    const dot = document.getElementById('conn-dot');
    const text = document.getElementById('conn-text');
    if (dot) dot.className = 'dot ' + (connected ? 'connected' : 'disconnected');
    if (text) text.textContent = connected ? 'API Connected' : 'Disconnected';
  }

  function showToast(message, type) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'success');
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 4000);
  }

  // ── Auth ──
  async function handleAuth(event) {
    event.preventDefault();
    const btn = event.target.querySelector('.form-submit');
    const origText = btn ? btn.innerHTML : '';
    if (btn) { btn.disabled = true; btn.innerHTML = 'Connecting...'; }

    try {
      const name = document.getElementById('auth-name').value;
      const type = document.getElementById('auth-type').value;
      const result = await apiCall('POST', '/api/auth/register', { name, type });

      if (result.success && result.data) {
        state.authenticated = true;
        state.userName = result.data.user.name;
        state.userId = result.data.user.id;
        state.authToken = result.data.token;

        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('user-name').textContent = state.userName;
        document.getElementById('user-avatar').textContent = state.userName.substring(0, 2).toUpperCase();
        document.getElementById('user-type').textContent = type;

        setConnectionStatus(true);
        // SocketManager already initialized in DOMContentLoaded; just authenticate now
        SocketManager.authenticate();
        loadView('dashboard');
        showToast('Welcome to the grid, ' + state.userName);
      } else {
        const err = document.getElementById('auth-error');
        err.textContent = result.error || 'Authentication failed';
        err.style.display = 'block';
        setConnectionStatus(false);
      }
    } catch (e) {
      const err = document.getElementById('auth-error');
      err.textContent = 'Error: ' + (e.message || 'Unknown');
      err.style.display = 'block';
      setConnectionStatus(false);
    } finally {
      if (btn) { btn.disabled = false; btn.innerHTML = origText; }
    }
  }

  function formatMessageContent(text) {
    if (!text) return '';
    // Simple markdown: code blocks, inline code, bold, italic, links
    let html = escapeHtml(text);
    html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    html = html.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
    return html.replace(/\n/g, '<br>');
  }

  }

  async function sendChatMessage(event) {
    event.preventDefault();
    const input = document.getElementById('chat-input-field');
    const content = input ? input.value.trim() : '';
    if (!content || !state.currentChannelId) return;

    // Try Socket.IO first, fall back to REST
    const sentViaSocket = SocketManager.sendMessage({
      content: content,
      authorId: state.userId || 'unknown',
      authorName: state.userName,
      authorType: 'human',
      channelId: state.currentChannelId
    });

    if (!sentViaSocket) {
      await apiCall('POST', '/api/messages', {
        content: content,
        authorId: state.userId || 'unknown',
        authorName: state.userName,
        authorType: 'human',
        channelId: state.currentChannelId
      });
    }

    if (input) input.value = '';
    // Do NOT reload the view — the socket will push the new message in real-time
    // If socket is down, append optimistically then let REST response refresh
    if (!sentViaSocket) {
      await loadView('chat');
    }
  }

  async function spawnBot(event) {
    event.preventDefault();
    const name = document.getElementById('bot-name');
    const template = document.getElementById('bot-template');
    if (name && template) {
      const result = await apiCall('POST', '/api/bots/spawn', { template: template.value, name: name.value });
      if (result.success) {
        showToast('Bot "' + name.value + '" spawned successfully');
        name.value = '';
      } else {
        showToast(result.error || 'Failed to spawn bot', 'error');
      }
      await loadView('bots');
    }
  }

  async function submitGoal(event) {
    event.preventDefault();
    const goal = document.getElementById('goal-input');
    if (goal) {
      const result = await apiCall('POST', '/api/orchestrate', { goal: goal.value });
      if (result.success) {
        showToast('Swarm launched for: ' + goal.value.substring(0, 40) + (goal.value.length > 40 ? '...' : ''));
        goal.value = '';
      } else {
        showToast(result.error || 'Failed to launch swarm', 'error');
      }
      await loadView('swarm');
    }
  }

  // ── Event Delegation ──
  function setupEventDelegation() {
    document.getElementById('sidebar-nav').addEventListener('click', function(e) {
      const link = e.target.closest('.sidebar-link[data-view]');
      if (link) {
        e.preventDefault();
        const view = link.getAttribute('data-view');
        if (view) switchView(view);
      }
      const actionLink = e.target.closest('.sidebar-link[data-action]');
      if (actionLink) {
        e.preventDefault();
        const action = actionLink.getAttribute('data-action');
        if (action === 'theme') openThemeDialog();
      }
    });

    document.addEventListener('click', function(e) {
      const viewBtn = e.target.closest('[data-view]');
      if (viewBtn && !e.target.closest('.sidebar-link')) {
        e.preventDefault();
        const view = viewBtn.getAttribute('data-view');
        if (view && VIEW_TITLES[view]) switchView(view);
        return;
      }
      const dialog = document.getElementById('theme-dialog');
      if (dialog && e.target === dialog) { dialog.close(); return; }
      if (e.target.closest('#theme-dialog-close')) { dialog.close(); return; }
      const themeBtn = e.target.closest('.theme-btn[data-theme-key]');
      if (themeBtn) { switchTheme(themeBtn.getAttribute('data-theme-key')); return; }
      const channelLink = e.target.closest('.channel-item[data-channel-id]');
      if (channelLink) { e.preventDefault(); selectChannel(channelLink.getAttribute('data-channel-id')); return; }
    });

    document.addEventListener('submit', function(e) {
      if (e.target.matches('#auth-form')) { handleAuth(e); return; }
      if (e.target.matches('#chat-form')) { sendChatMessage(e); return; }
      if (e.target.matches('#spawn-bot-form')) { spawnBot(e); return; }
      if (e.target.matches('#goal-form')) { submitGoal(e); return; }
    });
  }

  // ── Init ──
  document.addEventListener('DOMContentLoaded', function() {
    console.log('Janus Desktop v0.1 — Tauri:', isTauri);
    loadTheme();
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    setupEventDelegation();
    // Initialize Socket.IO early so it can connect in the background
    SocketManager.init();
  });
})();
  </script>
</body>
</html>
